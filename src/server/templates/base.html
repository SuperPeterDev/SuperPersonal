<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperPersonal Controller</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        },
                        primary: {
                            DEFAULT: '#3b82f6',
                            glow: '#60a5fa',
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply bg-white/5 backdrop-blur-lg border border-white/10;
            }
            .glow-text {
                text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            }
        }
        body {
            @apply bg-gray-900 text-white font-sans antialiased;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-2xl">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-2xl font-bold tracking-wider glow-text"><span class="text-primary">Super</span>Personal</h1>
        </div>
        <div class="flex space-x-4 text-sm font-medium text-gray-400">
            <a href="/" class="hover:text-white transition-colors">Dashboard</a>
            <a href="#" class="hover:text-white transition-colors">Settings</a>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-6 text-gray-500 text-sm glass mt-auto">
        &copy; 2026 SuperPersonal. System Online.
    </footer>

    {% block scripts %}{% endblock %}
    {% load static %}
    <script src="{% static 'js/app.js' %}"></script>
</body>

</html>
