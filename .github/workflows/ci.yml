name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          sudo -S -p '' apt-get install -y xvfb
          pip install -r requirements.txt
      - name: Run tests
        run: xvfb-run pytest
